<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Paciente</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <div class="card">

      <h1>Cadastro de Paciente</h1>
      <p>Preencha os dados do paciente para criar o acesso.</p>

      <div class="campo-input">
        <input type="text" id="campo-nome" placeholder="Nome completo">
      </div>

      <div class="campo-input">
        <input type="text" id="campo-cpf" placeholder="CPF">
      </div>

      <div class="campo-input">
        <input type="email" id="campo-email" placeholder="E-mail">
      </div>

      <div class="campo-input">
        <input type="password" id="campo-senha" placeholder="Senha de login">
      </div>

      <div class="campo-input">
        <input type="password" id="campo-senha-grafico" placeholder="Senha do gráfico">
      </div>

      <div class="campo-input">
        <input type="text" id="campo-foto" placeholder="URL da foto de perfil (opcional)">
      </div>

      <button id="btn-cadastrar">Cadastrar Paciente</button>

      <span class="seguranca">🔒 Dados protegidos</span>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
