<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mental Health</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tela-principal">

        <div class="topo-perfil">
            <div class="circulo-imagem">
                <img src="../../assets/icons/login-icon.png" alt="Usuário">
            </div>
        </div>

        <main class="card-login">
            <h2>Login</h2>

            <form id="formulario-login">
                <div class="campo-input">
                    <input type="text" id="campo-cpf" placeholder="CPF" required>
                </div>

                <div class="campo-input">
                    <input type="password" id="campo-senha" placeholder="Senha" required>
                </div>

                <button type="submit" id="botao-entrar">Entrar</button>
            </form>


        </main>

    </div>
    <script src="script.js"></script>
</body>
</html>
