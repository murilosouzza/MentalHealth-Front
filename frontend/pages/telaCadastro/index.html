<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Mental Health</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tela-principal">

    <div class="topo-perfil">
      <div class="circulo-imagem">
        <img src="../../assets/icons/login-icon.png" alt="Usuário">
      </div>
    </div>

    <main class="card-login">
      <h2>Cadastro</h2>

      <div class="campo-input">
        <input type="text" id="campo-nome" placeholder="Nome completo">
      </div>

      <div class="campo-input">
        <input type="email" id="campo-email" placeholder="E-mail">
      </div>

      <div class="campo-input">
        <input type="text" id="campo-cpf" placeholder="CPF">
      </div>

      <div class="campo-input">
        <input type="password" id="campo-senha" placeholder="Senha">
      </div>

      <button id="botao-cadastrar">Cadastrar</button>

      <p class="link-login">Já tem conta? <a href="../telaLogin/index.html">Fazer login</a></p>
    </main>

  </div>
  <script src="script.js"></script>
</body>
</html>
